# 麥田輸入法版本號管理 (Version Management for WFIME)
#
# versionName = VERSION_MAJOR.VERSION_MINOR.VERSION_PATCH  (語義化版本)
# versionCode = 每次 Gradle 建置時自動以當日日期 yyyyMMdd 產生（不需手動維護）
#
# 發版流程：
#   - 新功能     → 遞增 VERSION_MINOR，VERSION_PATCH 歸零
#   - 錯誤修正   → 遞增 VERSION_PATCH
#   - 重大變更   → 遞增 VERSION_MAJOR，其餘歸零

VERSION_MAJOR=1
VERSION_MINOR=2
VERSION_PATCH=1
