name: Build APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x LimeStudio/gradlew

      - name: Build debug APK
        run: cd LimeStudio && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wfime-debug-${{ github.sha }}
          path: LimeStudio/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        run: cd LimeStudio && ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: wfime-release-unsigned-${{ github.sha }}
          path: LimeStudio/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
